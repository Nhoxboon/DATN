<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .font-headline { font-family: 'Manrope', sans-serif; }

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            outline: 1px solid rgba(171, 179, 183, 0.15);
        }

<body class="bg-surface text-on-surface flex items-center justify-center min-h-screen p-6">
<!-- Auth Container -->
<main class="w-full max-w-md">
<!-- Floating Glassmorphism Effect Background -->
<div class="relative">
<!-- Decorative blur background elements -->
<div class="absolute -top-24 -left-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -right-24 w-64 h-64 bg-tertiary/5 rounded-full blur-3xl"></div>
<!-- Login Card -->
<div class="relative bg-surface-container-lowest rounded-xl shadow-[0_8px_32px_rgba(43,52,55,0.06)] overflow-hidden">
<div class="p-8 md:p-12">
<!-- Identity Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-12 h-12 bg-surface-container-high rounded-lg mb-4">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="menu_book">menu_book</span>
</div>
<h1 class="text-2xl font-extrabold tracking-tight text-on-surface font-headline mb-1">Scholar Script</h1>
<p class="text-on-surface-variant font-medium text-sm tracking-wide opacity-80">The Digital Atelier</p>
</div>
<!-- Auth Form -->
<form class="space-y-6">
<div class="space-y-4">
<!-- Email Field -->
<div>
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-2 ml-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none ghost-border rounded-lg px-4 py-3 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="email" name="email" placeholder="scholar@atelier.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-2 ml-1">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="text-xs font-medium text-primary hover:text-primary-dim transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-none ghost-border rounded-lg px-4 py-3 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-br from-primary to-primary-dim text-on-primary font-semibold py-3.5 rounded-lg shadow-md hover:shadow-lg active:scale-[0.98] transition-all duration-200 font-headline" type="submit">
                            Sign In
                        </button>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/15"></div>
<span class="flex-shrink mx-4 text-[10px] font-bold text-on-surface-variant/40 uppercase tracking-[0.2em]">or continue with</span>
<div class="flex-grow border-t border-outline-variant/15"></div>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-highest text-on-surface font-medium py-3 rounded-lg hover:bg-surface-dim transition-colors active:scale-[0.98] duration-200" type="button">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google 'G' icon with multi-colored segments on a clean transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAlCi3PhhZ3RQVhEaWLyMl0EoCkdY6J63SLMKh-Pe-z_ElZbbNLggD6AAreBeAOYTORmbxaIaCEgPzuyj4DZmL-G9RpSUr3vA2W9A809eRnit0hxJdjhjBfS2F34R7wWBLqu-50682l87lHEo3Av5IZ0pBM9nQ414czbcn9Rstqly2Pqii68qKQZg5mlAEXl7d2DDqTL2L2mj9NkKVN8lYPvyUNQRYDyBW5oa-9TnffQASXaOOAcx9WZUqR_-5rsWIvecrs14M3Rsw3"/>
<span>Sign in with Google</span>
</button>
</form>
</div>
<!-- Footer Link -->
<div class="bg-surface-container-low py-6 px-8 text-center">
<p class="text-sm text-on-surface-variant">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline ml-1" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Page Footer Meta -->
<footer class="mt-12 text-center">
<p class="text-[10px] font-headline font-bold uppercase tracking-[0.25em] text-on-surface-variant/40">
                    © 2024 Scholar Script. Designed for the Digital Atelier.
                </p>
<div class="flex justify-center gap-6 mt-4">
<a class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/50 hover:text-on-surface transition-colors" href="#">Privacy</a>
<a class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/50 hover:text-on-surface transition-colors" href="#">Terms</a>
<a class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/50 hover:text-on-surface transition-colors" href="#">Support</a>
</div>
</footer>
</div>
</main>
<!-- Visual Background Texture (Subtle Grain/Depth) -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[10%] left-[5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[10%] right-[5%] w-[30%] h-[30%] bg-tertiary/5 rounded-full blur-[100px]"></div>
</div>
