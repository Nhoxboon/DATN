<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scholar Script - Forgot Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#000000",
                        "tertiary-fixed": "#a478f7",
                        "secondary-fixed": "#c9e7f7",
                        "on-surface-variant": "#586064",
                        "on-error-container": "#752121",
                        "primary": "#005bc0",
                        "on-secondary-fixed-variant": "#435f6d",
                        "inverse-surface": "#0c0f10",
                        "surface-container-highest": "#dbe4e7",
                        "error-container": "#fe8983",
                        "on-primary-fixed": "#003d85",
                        "primary-container": "#d8e2ff",
                        "secondary-fixed-dim": "#bbd9e9",
                        "primary-dim": "#004fa9",
                        "tertiary-fixed-dim": "#966be9",
                        "on-secondary-container": "#395663",
                        "on-surface": "#2b3437",
                        "secondary-dim": "#3a5764",
                        "tertiary-dim": "#6436b4",
                        "background": "#f8f9fa",
                        "on-secondary-fixed": "#264350",
                        "outline": "#737c7f",
                        "on-secondary": "#f3faff",
                        "tertiary-container": "#a478f7",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#2b3437",
                        "surface-dim": "#d1dce0",
                        "surface-bright": "#f8f9fa",
                        "surface": "#f8f9fa",
                        "surface-tint": "#005bc0",
                        "outline-variant": "#abb3b7",
                        "secondary-container": "#c9e7f7",
                        "on-primary-container": "#004fa8",
                        "primary-fixed-dim": "#c2d4ff",
                        "primary-fixed": "#d8e2ff",
                        "on-tertiary-fixed-variant": "#26005a",
                        "on-error": "#fff7f6",
                        "inverse-on-surface": "#9b9d9e",
                        "surface-container-low": "#f1f4f6",
                        "surface-container-high": "#e3e9ec",
                        "error-dim": "#4e0309",
                        "tertiary": "#7044c1",
                        "on-primary": "#f7f7ff",
                        "error": "#9f403d",
                        "inverse-primary": "#4a8eff",
                        "secondary": "#466370",
                        "on-primary-fixed-variant": "#0058ba",
                        "on-tertiary": "#fef7ff",
                        "on-tertiary-container": "#16003a",
                        "surface-variant": "#dbe4e7",
                        "surface-container": "#eaeff1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .jewel-button {
            background: linear-gradient(135deg, #005bc0 0%, #004fa9 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- Navbar removed for minimalist transactional focus -->
<main class="flex-grow flex items-center justify-center px-6 relative">
<!-- Background Elements as per Digital Atelier Aesthetic -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[60%] bg-primary-container/20 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[30%] h-[50%] bg-tertiary-container/10 blur-[100px] rounded-full"></div>
</div>
<!-- Forgot Password Card - Perfectly Centered Container -->
<div class="max-w-md w-full z-10 flex flex-col items-center">
<!-- Content Canvas -->
<div class="w-full bg-surface-container-lowest p-10 rounded-xl shadow-[0_8px_32px_rgba(43,52,55,0.06)] border border-outline-variant/15">
<h1 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight mb-3 text-center">Forgot password</h1>
<p class="text-on-surface-variant text-base leading-relaxed mb-8 text-center">
                Enter your email to reset your password. We'll send a secure link to your inbox to help you get back to your studio.
            </p>
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface ml-1" for="email">Email address</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-0 rounded-md px-4 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="email" name="email" placeholder="name@scholarscript.com" required="" type="email"/>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-outline-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="mail">mail</span>
</div>
</div>
</div>
<button class="w-full jewel-button text-on-primary font-headline font-bold py-4 px-6 rounded-md shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-8 flex justify-center">
<a class="inline-flex items-center gap-2 text-sm font-semibold text-primary hover:text-primary-dim transition-colors group" href="#">
<span class="material-symbols-outlined text-lg transition-transform group-hover:-translate-x-1" data-icon="chevron_left">chevron_left</span>
                    Back to Login
                </a>
</div>
</div>
<!-- Aesthetic Secondary Detail -->
<div class="mt-10 flex items-center gap-6 opacity-60 w-full max-w-[280px]">
<div class="h-px flex-grow bg-outline-variant/30"></div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="shield" data-weight="fill" style="font-variation-settings: 'FILL' 1;">shield</span>
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="verified_user" data-weight="fill" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
<div class="h-px flex-grow bg-outline-variant/30"></div>
</div>
</div>
</main>
<!-- Footer as per Shared Components -->
<footer class="w-full py-12 bg-[#f8f9fa] dark:bg-slate-950 flex flex-col items-center gap-4 text-center border-t border-[#abb3b7]/15">
<p class="font-['Manrope'] text-xs uppercase tracking-widest text-[#2b3437] dark:text-slate-500 opacity-50">
        © 2024 Scholar Script. Designed for the Digital Atelier.
    </p>
<div class="flex gap-6">
<a class="font-['Manrope'] text-xs uppercase tracking-widest text-[#2b3437] dark:text-slate-500 opacity-50 hover:opacity-100 transition-opacity" href="#">Privacy</a>
<a class="font-['Manrope'] text-xs uppercase tracking-widest text-[#2b3437] dark:text-slate-500 opacity-50 hover:opacity-100 transition-opacity" href="#">Terms</a>
<a class="font-['Manrope'] text-xs uppercase tracking-widest text-[#2b3437] dark:text-slate-500 opacity-50 hover:opacity-100 transition-opacity" href="#">Support</a>
</div>
</footer>
</body></html>
