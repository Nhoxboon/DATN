services:
  redis:
    image: redis:7
    container_name: datn-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datn-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datn-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DOCUMENT_PROCESSING_MODE: worker
      DATN_REQUIRE_WORKER_MODE: "true"
      UPLOADS_DIR: /app/uploads
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./config.yaml:/app/config.yaml:ro
      - ./models:/app/models:ro
      - datn-uploads:/app/uploads
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - datn-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: datn-worker
    command:
      - uv
      - run
      - celery
      - -A
      - app.workers.celery_app
      - worker
      - --loglevel=info
      - --pool=solo
      - --concurrency=1
      - -Q
      - document_processing,embedding,storage,audio_overviews
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DOCUMENT_PROCESSING_MODE: worker
      DATN_REQUIRE_WORKER_MODE: "true"
      UPLOADS_DIR: /app/uploads
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./config.yaml:/app/config.yaml:ro
      - ./models:/app/models:ro
      - datn-uploads:/app/uploads
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - datn-network
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: datn-flower
    profiles:
      - monitoring
    command: ["uv", "run", "celery", "-A", "app.workers.celery_app", "flower", "--port=5555"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5555:5555"
    volumes:
      - ./app:/app/app
      - ./config.yaml:/app/config.yaml:ro
      - ./models:/app/models:ro
      - datn-uploads:/app/uploads
    networks:
      - datn-network
    restart: unless-stopped

networks:
  datn-network:
    driver: bridge

volumes:
  datn-uploads:
